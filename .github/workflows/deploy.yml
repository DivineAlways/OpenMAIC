name: Deploy

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Trigger Vercel deploy
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $RESPONSE"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [ deploy ]
    if: failure()

    steps:
      - name: Send Telegram alert on deploy failure
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚨 OnlyCrypto Academy deploy FAILED on commit ${{ github.sha }} — check GitHub Actions"
